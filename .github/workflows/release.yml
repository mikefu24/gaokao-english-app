name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 打 v4.x.x tag 时自动触发

jobs:
  # ─── Android APK ──────────────────────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies & build web
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/gaokao-release.keystore

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  # ─── iOS IPA ──────────────────────────────────────────────────────────────
  ios:
    name: Build iOS IPA
    runs-on: macos-15        # Xcode 16 pre-installed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies & build web
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/GaokaoEnglish.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -allowProvisioningUpdates

      - name: Package IPA
        run: |
          mkdir -p /tmp/ipa_payload/Payload
          cp -R "/tmp/GaokaoEnglish.xcarchive/Products/Applications/App.app" \
                /tmp/ipa_payload/Payload/
          cd /tmp/ipa_payload
          zip -r /tmp/GaokaoEnglish.ipa Payload/ -x "*.DS_Store"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: /tmp/GaokaoEnglish.ipa

  # ─── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist-mobile/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist-mobile/

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          mv dist-mobile/app-release.apk "dist-mobile/高考英语_${TAG}.apk"
          mv dist-mobile/GaokaoEnglish.ipa "dist-mobile/高考英语_${TAG}.ipa"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-mobile/*
          generate_release_notes: true
